{% extends 'base.html' %}

{% block title %}حذف عميل - نظام المخازن{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="fas fa-user-minus fa-4x text-danger"></i>
                    </div>
                    <h2 class="h4 mb-3 font-weight-bold">تأكيد حذف العميل</h2>
                    <p class="text-muted mb-4">
                        هل أنت متأكد من حذف العكيل <strong>"{{ customer.name }}"</strong>؟
                        <br>
                        <span class="text-danger small">تحذير: قد يؤثر هذا على سجلات المبيعات السابقة.</span>
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <a href="{% url 'sales:customer_list' %}" class="btn btn-light px-4 border">إلغاء</a>
                            <button type="submit" class="btn btn-danger px-4">تأكيد الحذف</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
