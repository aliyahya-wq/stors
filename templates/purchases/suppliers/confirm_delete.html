{% extends 'base.html' %}

{% block title %}حذف مورد - نظام المخازن{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow border-0">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <i class="fas fa-exclamation-triangle fa-4x text-danger animate__animated animate__pulse animate__infinite"></i>
                    </div>
                    <h2 class="h4 mb-3 font-weight-bold">تأكيد حذف المورد</h2>
                    <p class="text-muted mb-4">
                        هل أنت متأكد من رغبتك في حذف المورد <strong>"{{ supplier.name }}"</strong>؟
                        <br>
                        <span class="text-danger small">تحذير: هذا الإجراء قد يؤثر على سجلات المشتريات المرتبطة.</span>
                    </p>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                            <a href="{% url 'purchases:supplier_list' %}" class="btn btn-light px-4 border">إلغاء</a>
                            <button type="submit" class="btn btn-danger px-4">تأكيد الحذف النهائي</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
